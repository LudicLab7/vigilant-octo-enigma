name: Unity Test Build Release

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:   # przycisk "Run workflow" w Actions tab

jobs:
  test:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ hashFiles('**/Packages/manifest.json') }}
          restore-keys: Library-

      - name: Setup Unity
        uses: game-ci/unity-setup-action@v2
        with:
          version: 6000.3.8f1

      - name: Run tests
        shell: pwsh
        run: |
          & "$env:UNITY_PATH/Editor/Unity.exe" `
            -batchmode `
            -projectPath "." `
            -runTests `
            -testResults "test-results.xml" `
            -testPlatform editmode `
            -logFile "test-log.txt"
          exit $LASTEXITCODE

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            test-results.xml
            test-log.txt

  build:
    needs: test
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ hashFiles('**/Packages/manifest.json') }}
          restore-keys: Library-

      - name: Setup Unity
        uses: game-ci/unity-setup-action@v2
        with:
          version: 6000.3.8f1

      - name: Build project
        shell: pwsh
        run: |
          & "$env:UNITY_PATH/Editor/Unity.exe" `
            -batchmode `
            -projectPath "." `
            -buildTarget StandaloneWindows64 `
            -executeMethod UnityEditor.BuildPlayerWindow.DefaultBuildMethods.BuildPlayer `
            -logFile "build-log.txt"
          exit $LASTEXITCODE

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: Build-Windows
          path: build/StandaloneWindows64

  release:
    needs: build
    runs-on: self-hosted
    permissions:
      contents: write
    environment: release-env
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: Build-Windows
          path: build/

      - name: Pack build into zip
        shell: pwsh
        run: |
          Compress-Archive -Path "build/StandaloneWindows64/*" -DestinationPath "build/CI-Build-Windows.zip" -Force

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.1.0-dev-${{ github.sha }}
          name: Pre-release dev-${{ github.sha }}
          prerelease: true
          generate_release_notes: true
          files: build/CI-Build-Windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
